- name: Install SpacetimeDB CLI
  shell: bash
  run: |
    curl -sSf https://install.spacetimedb.com | bash -s -- -y
    export PATH="$HOME/.local/bin:$PATH"
    echo "$HOME/.local/bin" >> $GITHUB_PATH
    # Pin CLI version to match SDK version in Cargo.lock
    spacetime version install 2.0.5
    spacetime version use 2.0.5
